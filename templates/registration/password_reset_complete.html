{% extends "base.html" %}
{% load static %}

{% block title %}Password updated — StudyAssists{% endblock %}

{% block content %}
<div class="sa-auth-page">
    <div class="sa-auth-card" style="text-align: center;">
        <div class="sa-login-logo">
            <svg width="40" height="40" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#22c1ff" d="M2 7l10-5 10 5v2l-10 5L2 9z"></path>
                <path fill="#0ea5a4" d="M2 12l10-5 10 5v2l-10 5L2 14z" opacity="0.15"></path>
            </svg>
        </div>
        <div style="margin-bottom: 16px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </div>
        <h2>Password updated</h2>
        <p class="sa-login-subtitle">Your password has been changed successfully. You can now sign in with your new password.</p>
        <a href="/" class="sa-auth-btn sa-auth-email" style="display:inline-block; text-align:center; text-decoration:none;">Go to home</a>
    </div>
</div>
{% endblock %}
